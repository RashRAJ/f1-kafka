      retention.ms: "1209600000"  # 14 days
      max.message.bytes: "2097152"  # 2MB

  - name: "f1-results"
    partitions: 3
    replication_factor: 3
    config:
      retention.ms: "2592000000"  # 30 days
      max.message.bytes: "2097152"  # 2MB

  - name: "f1-grid"
    partitions: 3
    replication_factor: 3
    config:
      retention.ms: "2592000000"  # 30 days
      max.message.bytes: "2097152"  # 2MB

  - name: "f1-radio"
